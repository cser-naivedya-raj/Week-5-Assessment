server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/orders/**,/users/**,/restaurants/**,/auth/**
          filters:
            - JwtAuthFilter

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/payments/**
          filters:
            - JwtAuthFilter

        - id: delivery-service
          uri: lb://delivery-service
          predicates:
            - Path=/delivery/**
          filters:
            - JwtAuthFilter

        - id: shipping-service
          uri: lb://shipping-service
          predicates:
            - Path=/shipping/**
          filters:
            - JwtAuthFilter

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/notifications/**
          filters:
            - JwtAuthFilter

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: ZmQ0ZGI5NjQ0MDQwY2I4MjMxY2Y3ZmI3MjdhN2ZmMjNhODViOTg1ZGJkYmQwNTI3NzBiNjMzNTI5OGZhMGJkNg==

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
